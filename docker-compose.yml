version: '3.8'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=netflix_user
      - DB_PASSWORD=netflix_pass
      - DB_NAME=netflix_inventory
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=netflix_user
      - POSTGRES_PASSWORD=netflix_pass
      - POSTGRES_DB=netflix_inventory
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U netflix_user -d netflix_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
